#version: '3.9'

networks:
  travel-network:
    driver: bridge

x-microservice-base: &microservice-base
  networks:
    - travel-network
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
    kafka:
      condition: service_healthy
  environment:
    SPRING_PROFILES_ACTIVE: docker
    DB_HOST: postgres
    DB_PORT: 5432
    REDIS_HOST: redis
    REDIS_PORT: 6379
    KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    KEYCLOAK_SERVER_URL: http://keycloak:8080
  restart: unless-stopped
services:

  # =========================
  # INFRASTRUCTURE & DATABASES
  # =========================

  postgres:
    image: postgres:15-alpine
    container_name: travel-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - travel-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: travel-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - travel-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  keycloak:
    image: quay.io/keycloak/keycloak:22.0.1
    container_name: travel-keycloak
    command: start-dev
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: postgres
      KC_DB_PASSWORD: postgres
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    networks:
      - travel-network
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  kafka:
    image: apache/kafka:3.7.0
    container_name: travel-kafka
    hostname: kafka
    user: "0:0"   # 👈 TEMP fix (run as root)
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    volumes:
      - kafka_data:/tmp/kafka-logs
  # =========================
  # MICROSERVICES
  # =========================
  # Base settings shared via YAML anchors to keep code DRY


  users-service:
    <<: *microservice-base
    build:
      context: .
      dockerfile: travel-users-service/Dockerfile
    container_name: users-service
    ports:
      - "8081:8081"

  poi-service:
    <<: *microservice-base
    build:
      context: .
      dockerfile: travel-poi-service/Dockerfile
    container_name: poi-service
    ports:
      - "8082:8082"

  booking-service:
    <<: *microservice-base
    build:
      context: .
      dockerfile: travel-booking-service/Dockerfile
    container_name: booking-service
    ports:
      - "8083:8083"

  itinerary-service:
    <<: *microservice-base
    build:
      context: .
      dockerfile: travel-itinerary-service/Dockerfile
    container_name: itinerary-service
    ports:
      - "8084:8084"

  notification-service:
    <<: *microservice-base
    build:
      context: .
      dockerfile: travel-notification-service/Dockerfile
    container_name: notification-service
    ports:
      - "8085:8085"

  auth-service:
    <<: *microservice-base
    build:
      context: .
      dockerfile: travel-auth-service/Dockerfile
    container_name: auth-service
    ports:
      - "8086:8086"

  # =========================
  # MONITORING
  # =========================

  prometheus:
    image: prom/prometheus:latest
    container_name: travel-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - travel-network

  grafana:
    image: grafana/grafana:latest
    container_name: travel-grafana
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - travel-network

volumes:
  postgres_data:
  redis_data:
  kafka_data:
  grafana_data: